<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>示波器控制面板</title>
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #111118;
  --bg-tertiary: #18181f;
  --bg-hover: #1e1e28;
  --bg-waveform: #000;
  --border: #252530;
  --text-primary: #e4e4ec;
  --text-secondary: #7a7a8a;
  --text-muted: #4a4a58;
  --ch1: #f5c842;
  --ch2: #3dd68c;
  --ch3: #e54d6d;
  --ch4: #54a0ff;
  --danger: #e5484d;
  --success: #3dd68c;
  --accent: #3b82f6;
  --radius: 4px;
  --radius-lg: 6px;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 12px;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
#root { height: 100vh; display: flex; flex-direction: column; }

/* === 顶部栏 === */
.topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px;
  height: 40px; flex-shrink: 0;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}
.topbar .brand { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-right: 8px; letter-spacing: 0.3px; }
.topbar .status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}
.topbar .status-dot.connected { background: var(--success); box-shadow: 0 0 6px rgba(61,214,140,0.4); }
.topbar .dev-info { font-size: 11px; color: var(--text-secondary); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.topbar .spacer { flex: 1; }
.topbar button {
  height: 28px; padding: 0 12px;
  background: var(--bg-tertiary); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 11px; cursor: pointer;
  transition: background 0.15s;
  display: inline-flex; align-items: center; gap: 4px;
}
.topbar button:hover { background: var(--bg-hover); }
.topbar button.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.topbar button.accent:hover { opacity: 0.9; }
.topbar button:disabled { opacity: 0.35; cursor: default; }
.topbar button:disabled:hover { background: var(--bg-tertiary); }
.topbar button.accent:disabled:hover { background: var(--accent); }
.topbar .ws-indicator {
  font-size: 10px; color: var(--text-muted);
  padding: 2px 8px; border-radius: 10px; background: var(--bg-tertiary);
}

/* === 主布局 === */
.main { display: flex; flex: 1; overflow: hidden; }

/* === 侧边栏 === */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
}
.panel {
  border-bottom: 1px solid var(--border);
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  cursor: pointer; user-select: none;
  transition: background 0.1s;
}
.panel-header:hover { background: var(--bg-tertiary); }
.panel-header .dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; margin-right: 6px;
}
.panel-header .title {
  font-size: 11px; font-weight: 500; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.3px;
  flex: 1;
}
.panel-header .collapse-icon {
  font-size: 10px; color: var(--text-muted);
  transition: transform 0.15s;
}
.panel-header .collapse-icon.open { transform: rotate(90deg); }
.panel-body {
  padding: 0 12px 10px;
  display: none;
}
.panel-body.open { display: block; }
.panel-body label {
  display: block; font-size: 10px; color: var(--text-muted);
  margin-bottom: 2px; margin-top: 6px;
}
.panel-body select, .panel-body input {
  width: 100%; height: 28px;
  background: var(--bg-primary); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0 6px; font-size: 11px;
}
.panel-body select:focus, .panel-body input:focus {
  outline: none; border-color: var(--accent);
}
.panel-body .toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 6px;
}
.panel-body .toggle-btn {
  padding: 3px 12px; border-radius: 3px;
  border: none; font-size: 11px; cursor: pointer; font-weight: 500;
  background: var(--bg-primary); color: var(--text-secondary);
}
.panel-body .toggle-btn.on { color: #000; }

/* === 测量面板 === */
.measure-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 2px 12px;
}
.measure-item {
  display: flex; justify-content: space-between;
  padding: 2px 0;
}
.measure-item .label { font-size: 10px; color: var(--text-muted); }
.measure-item .value {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-primary); text-align: right;
}
.measure-refresh {
  width: 100%; height: 26px; margin-top: 8px;
  background: var(--bg-primary); color: var(--text-secondary);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 11px; cursor: pointer;
}
.measure-refresh:hover { background: var(--bg-hover); }

/* === 波形区 === */
.waveform-area {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg-waveform);
  position: relative;
}
.waveform-area #chart { flex: 1; }

/* === 底部栏 === */
.bottombar {
  display: flex; align-items: center; gap: 16px;
  height: 24px; flex-shrink: 0;
  padding: 0 16px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text-muted);
}

/* === 弹窗 === */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
  min-width: 380px; max-width: 480px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal h2 { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
.modal .list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: var(--radius);
  margin-bottom: 4px;
  transition: background 0.1s;
}
.modal .list-item:hover { background: var(--bg-tertiary); }
.modal .list-item .desc { font-size: 10px; color: var(--text-secondary); margin-top: 1px; }
.modal .btn-sm {
  padding: 4px 12px; border: none; border-radius: var(--radius);
  font-size: 11px; cursor: pointer; font-weight: 500;
}
.modal .btn-sm.primary { background: var(--accent); color: #fff; }
.modal .btn-sm.danger { background: var(--danger); color: #fff; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.modal .btn-row button {
  height: 30px; padding: 0 16px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-tertiary); color: var(--text-primary);
  font-size: 12px; cursor: pointer;
}
.modal .btn-row button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.modal input[type="text"] {
  width: 100%; height: 32px;
  background: var(--bg-tertiary); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0 10px; font-size: 12px; margin: 8px 0;
}
.modal input[type="text"]:focus { outline: none; border-color: var(--accent); }

/* === 滚动条 === */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<script>
const { useState, useEffect, useCallback, useRef, createElement: h } = React;

// === WebSocket Hook ===
function useWebSocket() {
  const [ws, setWs] = useState(null);
  const [connected, setConnected] = useState(false);
  const [scopeConnected, setScopeConnected] = useState(false);
  const [scopeInfo, setScopeInfo] = useState(null);
  const [error, setError] = useState("");
  const listenersRef = useRef({});

  useEffect(() => {
    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    const socket = new WebSocket(`${protocol}//${location.host}/ws`);
    socket.onopen = () => setConnected(true);
    socket.onclose = () => setConnected(false);
    socket.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      const handlers = listenersRef.current[msg.type];
      if (handlers) handlers.forEach(fn => fn(msg));
    };
    setWs(socket);
    return () => socket.close();
  }, []);

  const send = useCallback((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
  }, [ws]);

  const on = useCallback((type, fn) => {
    if (!listenersRef.current[type]) listenersRef.current[type] = [];
    listenersRef.current[type].push(fn);
    return () => {
      listenersRef.current[type] = listenersRef.current[type].filter(f => f !== fn);
    };
  }, []);

  return { send, on, connected, scopeConnected, scopeInfo, error, setScopeConnected, setScopeInfo, setError };
}

// === 顶部栏组件 ===
function TopBar({ wsConnected, scopeConnected, scopeInfo, scanning, showScan, setShowScan, devices, send, presets, showPresetSave, setShowPresetSave, showPresetLoad, setShowPresetLoad }) {
  return h("div", { className: "topbar" },
    h("span", { className: "brand" }, "SCOPE"),
    h("span", { className: "status-dot" + (scopeConnected ? " connected" : ""), title: scopeConnected ? "已连接" : "未连接" }),
    h("span", { className: "dev-info" }, scopeConnected ? (scopeInfo?.idn || scopeInfo?.ip) : "未连接"),
    h("span", { className: "spacer" }),
    h("button", { onClick: () => { send({ type: "scan" }); setShowScan(true); } }, "扫描"),
    h("button", { onClick: () => send({ type: "capture" }), disabled: !scopeConnected }, "截图"),
    h("button", { onClick: () => setShowPresetSave(true), disabled: !scopeConnected }, "保存"),
    h("button", { onClick: () => { send({ type: "preset_list" }); setShowPresetLoad(true); } }, "加载"),
    h("span", { className: "ws-indicator" }, wsConnected ? "WS" : "断线"),

    showScan && h(ScanModal, { scanning, devices, send, setShowScan }),
    showPresetSave && h(PresetSaveModal, { send, setShow: setShowPresetSave }),
    showPresetLoad && h(PresetLoadModal, { presets, send, setShow: setShowPresetLoad })
  );
}

function ScanModal({ scanning, devices, send, setShowScan }) {
  return h("div", { className: "modal-overlay", onClick: (e) => e.target === e.currentTarget && setShowScan(false) },
    h("div", { className: "modal" },
      h("h2", null, "扫描设备"),
      scanning && h("p", { style: { color: "var(--text-secondary)", fontSize: 12 } }, "正在扫描 192.168.1.1 ~ 192.168.1.254 ..."),
      !scanning && devices.length === 0 && h("p", { style: { color: "var(--text-muted)", fontSize: 12 } }, "未发现 SCPI 设备，请确认示波器已联网"),
      devices.map(d => h("div", { className: "list-item", key: d.ip },
        h("div", null, h("div", { style: { fontSize: 12 } }, d.ip), h("div", { className: "desc" }, d.idn)),
        h("button", { className: "btn-sm primary", onClick: () => { send({ type: "connect", ip: d.ip }); setShowScan(false); } }, "连接")
      )),
      h("div", { className: "btn-row" },
        h("button", { onClick: () => setShowScan(false) }, "关闭")
      )
    )
  );
}

function PresetSaveModal({ send, setShow }) {
  const [name, setName] = React.useState("");
  return h("div", { className: "modal-overlay", onClick: (e) => e.target === e.currentTarget && setShow(false) },
    h("div", { className: "modal" },
      h("h2", null, "保存预设"),
      h("input", { type: "text", placeholder: "输入预设名称...", value: name, onChange: (e) => setName(e.target.value), autoFocus: true }),
      h("div", { className: "btn-row" },
        h("button", { className: "primary", onClick: () => { send({ type: "preset_save", name }); setShow(false); }, disabled: !name }, "保存"),
        h("button", { onClick: () => setShow(false) }, "取消")
      )
    )
  );
}

function PresetLoadModal({ presets, send, setShow }) {
  return h("div", { className: "modal-overlay", onClick: (e) => e.target === e.currentTarget && setShow(false) },
    h("div", { className: "modal" },
      h("h2", null, "加载预设"),
      presets.length === 0 && h("p", { style: { color: "var(--text-muted)", fontSize: 12 } }, "暂无已保存的预设"),
      presets.map(p => h("div", { className: "list-item", key: p },
        h("span", { style: { fontSize: 12 } }, p),
        h("div", { style: { display: "flex", gap: 6 } },
          h("button", { className: "btn-sm primary", onClick: () => { send({ type: "preset_load", name: p }); setShow(false); } }, "加载"),
          h("button", { className: "btn-sm danger", onClick: () => { send({ type: "preset_delete", name: p }); send({ type: "preset_list" }); } }, "删除")
        )
      )),
      h("div", { className: "btn-row" },
        h("button", { onClick: () => setShow(false) }, "关闭")
      )
    )
  );
}

// === 侧边栏组件 ===
const CH_COLORS = { 1: "var(--ch1)", 2: "var(--ch2)", 3: "var(--ch3)", 4: "var(--ch4)" };

function Sidebar({ scopeConnected, channels, setChannels, timebase, setTimebase, trigger, setTrigger, measurements, presets, send }) {
  // 面板展开状态: ch1, ch2, timebase, trigger, measure
  const [openPanels, setOpenPanels] = React.useState({ ch1: true, ch2: true, timebase: true, trigger: false, measure: false });

  const togglePanel = (key) => {
    setOpenPanels(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const updateChannel = (ch, key, value) => {
    setChannels(prev => ({ ...prev, [ch]: { ...prev[ch], [key]: value } }));
    if (scopeConnected) {
      let cmd = "";
      if (key === "on") cmd = `:CHANnel${ch}:DISPlay ${value ? "ON" : "OFF"}`;
      else if (key === "scale") cmd = `:CHANnel${ch}:SCALe ${value}`;
      else if (key === "offset") cmd = `:CHANnel${ch}:OFFSet ${value}`;
      send({ type: "scpi", command: cmd });
    }
  };

  const updateTimebase = (key, value) => {
    setTimebase(prev => ({ ...prev, [key]: value }));
    if (scopeConnected) send({ type: "scpi", command: `:TIMebase:${key.toUpperCase()} ${value}` });
  };

  const updateTrigger = (key, value) => {
    setTrigger(prev => ({ ...prev, [key]: value }));
    if (scopeConnected) {
      const cmdKey = key === "level" ? "LEVel" : key.toUpperCase();
      send({ type: "scpi", command: `:TRIGger:${cmdKey} ${value}` });
    }
  };

  const formatVal = (v) => {
    if (v === null || v === undefined) return "--";
    if (typeof v === "number") {
      if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(3) + "M";
      if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(2) + "k";
      if (Math.abs(v) < 1e-3 && v !== 0) return (v * 1e6).toFixed(1) + "u";
      return Number(v.toPrecision(4)).toString();
    }
    return v;
  };

  const CH_PANEL = (ch) => h("div", { className: "panel", key: `ch${ch}` },
    h("div", { className: "panel-header", onClick: () => togglePanel(`ch${ch}`) },
      h("span", { className: "dot", style: { background: channels[ch].on ? CH_COLORS[ch] : "var(--text-muted)" } }),
      h("span", { className: "title" }, `通道 ${ch}`),
      h("span", { className: "collapse-icon" + (openPanels[`ch${ch}`] ? " open" : "") }, "▶")
    ),
    h("div", { className: "panel-body" + (openPanels[`ch${ch}`] ? " open" : "") },
      h("div", { className: "toggle-row" },
        h("span", { style: { fontSize: 10, color: "var(--text-muted)" } }, "开关"),
        h("button", {
          className: "toggle-btn" + (channels[ch].on ? " on" : ""),
          style: channels[ch].on ? { background: CH_COLORS[ch] } : {},
          onClick: (e) => { e.stopPropagation(); updateChannel(ch, "on", !channels[ch].on); }
        }, channels[ch].on ? "ON" : "OFF")
      ),
      h("label", null, "档位 (V/div)"),
      h("select", { value: channels[ch].scale, onChange: (e) => updateChannel(ch, "scale", parseFloat(e.target.value)) },
        ["0.001","0.002","0.005","0.01","0.02","0.05","0.1","0.2","0.5","1","2","5","10"].map(v =>
          h("option", { key: v, value: v }, v + "V")
        )
      ),
      h("label", null, "偏置 (V)"),
      h("input", { type: "number", step: 0.01, value: channels[ch].offset, onChange: (e) => updateChannel(ch, "offset", parseFloat(e.target.value) || 0) })
    )
  );

  return h("div", { className: "sidebar" },
    CH_PANEL(1), CH_PANEL(2), CH_PANEL(3), CH_PANEL(4),

    // 时基控制
    h("div", { className: "panel" },
      h("div", { className: "panel-header", onClick: () => togglePanel("timebase") },
        h("span", { className: "dot", style: { background: "var(--text-muted)" } }),
        h("span", { className: "title" }, "时基"),
        h("span", { className: "collapse-icon" + (openPanels.timebase ? " open" : "") }, "▶")
      ),
      h("div", { className: "panel-body" + (openPanels.timebase ? " open" : "") },
        h("label", null, "时间档位 (s/div)"),
        h("select", { value: timebase.scale, onChange: (e) => updateTimebase("scale", parseFloat(e.target.value)) },
          ["1e-9","2e-9","5e-9","1e-8","2e-8","5e-8","1e-7","2e-7","5e-7",
           "1e-6","2e-6","5e-6","1e-5","2e-5","5e-5","1e-4","2e-4","5e-4",
           "1e-3","2e-3","5e-3","1e-2","2e-2","5e-2","1e-1","2e-1","5e-1","1"].map(v =>
            h("option", { key: v, value: v }, formatVal(parseFloat(v)) + "s")
          )
        ),
        h("label", null, "水平偏移 (s)"),
        h("input", { type: "number", step: 1e-6, value: timebase.offset, onChange: (e) => updateTimebase("offset", parseFloat(e.target.value) || 0) })
      )
    ),

    // 触发控制
    h("div", { className: "panel" },
      h("div", { className: "panel-header", onClick: () => togglePanel("trigger") },
        h("span", { className: "dot", style: { background: trigger.level !== 0 ? "var(--warning)" : "var(--text-muted)" } }),
        h("span", { className: "title" }, "触发"),
        h("span", { className: "collapse-icon" + (openPanels.trigger ? " open" : "") }, "▶")
      ),
      h("div", { className: "panel-body" + (openPanels.trigger ? " open" : "") },
        h("label", null, "电平 (V)"),
        h("input", { type: "number", step: 0.01, value: trigger.level, onChange: (e) => updateTrigger("level", parseFloat(e.target.value) || 0) }),
        h("label", null, "模式"),
        h("select", { value: trigger.mode, onChange: (e) => updateTrigger("mode", e.target.value) },
          ["EDGE","GLITch","PATTern","TV","DELay","EBURst","OR","SHOLd","SBUS"].map(v =>
            h("option", { key: v, value: v }, v)
          )
        ),
        h("label", null, "源"),
        h("select", { value: trigger.source, onChange: (e) => updateTrigger("source", e.target.value) },
          ["CHAN1","CHAN2","CHAN3","CHAN4","EXT","LINE","WGEN"].map(v =>
            h("option", { key: v, value: v }, v)
          )
        )
      )
    ),

    // 测量结果
    h("div", { className: "panel" },
      h("div", { className: "panel-header", onClick: () => togglePanel("measure") },
        h("span", { className: "dot", style: { background: measurements.freq ? "var(--success)" : "var(--text-muted)" } }),
        h("span", { className: "title" }, "测量"),
        h("span", { className: "collapse-icon" + (openPanels.measure ? " open" : "") }, "▶")
      ),
      h("div", { className: "panel-body" + (openPanels.measure ? " open" : "") },
        h("div", { className: "measure-grid" },
          ...[
            ["freq","频率","Hz"],["vpp","峰峰值","V"],["vavg","平均值","V"],
            ["vrms","有效值","V"],["vmax","最大值","V"],["vmin","最小值","V"],
            ["period","周期","s"],["rise_time","上升时间","s"]
          ].map(([key, label, unit]) =>
            h("div", { className: "measure-item", key },
              h("span", { className: "label" }, label),
              h("span", { className: "value" }, formatVal(measurements[key]) + (measurements[key] != null ? " " + unit : ""))
            )
          )
        ),
        h("button", { className: "measure-refresh", onClick: () => { if (scopeConnected) send({ type: "measure" }); }, disabled: !scopeConnected }, "刷新")
      )
    )
  );
}

// === 波形显示区 ===
function WaveformArea({ scopeConnected, send, on }) {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const waveDataRef = useRef({ 1: { x: [], y: [] }, 2: { x: [], y: [] }, 3: { x: [], y: [] }, 4: { x: [], y: [] } });
  const fpsRef = useRef(0);
  const lastFrameRef = useRef(Date.now());
  const pollingRef = useRef(null);

  // 初始化 ECharts
  useEffect(() => {
    const dom = document.getElementById("chart");
    chartInstance.current = echarts.init(dom, null, { renderer: "canvas" });
    chartInstance.current.setOption({
      backgroundColor: "#000",
      textStyle: { color: "#e6edf3" },
      grid: { left: 60, right: 16, top: 12, bottom: 40 },
      xAxis: {
        type: "value",
        axisLine: { lineStyle: { color: "#30363d" } },
        axisLabel: { color: "#8b949e", fontSize: 10, formatter: (v) => formatEng(v, "s") },
        splitLine: { lineStyle: { color: "#161b22" } },
      },
      yAxis: {
        type: "value",
        axisLine: { lineStyle: { color: "#30363d" } },
        axisLabel: { color: "#8b949e", fontSize: 10 },
        splitLine: { lineStyle: { color: "#161b22" } },
      },
      animation: false,
      series: [
        { name: "CH1", type: "line", data: [], lineStyle: { color: "#ffd700", width: 1.5 }, showSymbol: false, silent: true },
        { name: "CH2", type: "line", data: [], lineStyle: { color: "#00ff88", width: 1.5 }, showSymbol: false, silent: true },
        { name: "CH3", type: "line", data: [], lineStyle: { color: "#ff6b9d", width: 1.5 }, showSymbol: false, silent: true },
        { name: "CH4", type: "line", data: [], lineStyle: { color: "#4da6ff", width: 1.5 }, showSymbol: false, silent: true },
      ],
    });

    const handleResize = () => chartInstance.current?.resize();
    window.addEventListener("resize", handleResize);
    return () => {
      window.removeEventListener("resize", handleResize);
      chartInstance.current?.dispose();
    };
  }, []);

  // 监听波形数据
  useEffect(() => {
    const unsubs = [];
    unsubs.push(on("waveform_data", (msg) => {
      if (msg.x && msg.y) {
        const data = msg.x.map((xi, i) => [xi, msg.y[i]]);
        waveDataRef.current[msg.channel] = { x: msg.x, y: msg.y };
        if (chartInstance.current) {
          chartInstance.current.setOption({
            series: [{ id: msg.channel - 1, data }],
          }, { replaceMerge: ["series"] });
        }
        // FPS 计算
        const now = Date.now();
        fpsRef.current = Math.round(1000 / (now - lastFrameRef.current));
        lastFrameRef.current = now;
      }
    }));
    return () => unsubs.forEach(fn => fn());
  }, [on]);

  // 波形轮询（连接后始终轮询，后端做 mock 降级）
  useEffect(() => {
    const fetchWave = () => {
      [1, 2].forEach(ch => {
        send({ type: "waveform", channel: ch });
      });
    };
    fetchWave();
    pollingRef.current = setInterval(fetchWave, 100);
    return () => {
      if (pollingRef.current) clearInterval(pollingRef.current);
    };
  }, [send]);

  return h("div", { className: "waveform-area" },
    h("div", { id: "chart", style: { width: "100%", height: "100%" } })
  );
}

function formatEng(v, unit) {
  if (Math.abs(v) >= 1) return v.toFixed(4).replace(/0+$/, "").replace(/\.$/, "") + " " + unit;
  if (Math.abs(v) >= 1e-3) return (v * 1e3).toFixed(2) + " m" + unit;
  if (Math.abs(v) >= 1e-6) return (v * 1e6).toFixed(1) + " u" + unit;
  if (Math.abs(v) >= 1e-9) return (v * 1e9).toFixed(1) + " n" + unit;
  return v.toExponential(1) + " " + unit;
}

// === 底部栏 ===
function BottomBar({ wsConnected, scopeConnected, fps }) {
  return h("div", { className: "bottombar" },
    h("span", null, `WS ${wsConnected ? "ON" : "OFF"}`),
    h("span", null, `示波器 ${scopeConnected ? "ON" : "OFF"}`),
    h("span", null, fps > 0 ? `${fps} fps` : ""),
    h("span", { style: { marginLeft: "auto" } }, "v1.0")
  );
}

// === App 组件 ===
function App() {
  const {
    send, on, connected: wsConnected,
    scopeConnected, setScopeConnected, scopeInfo, setScopeInfo
  } = useWebSocket();
  const [devices, setDevices] = useState([]);
  const [scanning, setScanning] = useState(false);
  const [showScan, setShowScan] = useState(false);
  const [measurements, setMeasurements] = useState({});
  const [presets, setPresets] = useState([]);
  const [showPresetSave, setShowPresetSave] = useState(false);
  const [showPresetLoad, setShowPresetLoad] = useState(false);
  const [fps, setFps] = useState(0);
  const [channels, setChannels] = useState({
    1: { on: true, scale: 1.0, offset: 0 },
    2: { on: true, scale: 1.0, offset: 0 },
    3: { on: false, scale: 1.0, offset: 0 },
    4: { on: false, scale: 1.0, offset: 0 },
  });
  const [timebase, setTimebase] = useState({ scale: 1e-3, offset: 0 });
  const [trigger, setTrigger] = useState({ level: 0, mode: "EDGE", source: "CHAN1" });

  // 监听后端消息
  useEffect(() => {
    const unsubs = [];
    unsubs.push(on("connected", (m) => { setScopeConnected(true); setScopeInfo(m); }));
    unsubs.push(on("disconnected", () => { setScopeConnected(false); setScopeInfo(null); }));
    unsubs.push(on("scan_done", (m) => { setDevices(m.devices); setScanning(false); }));
    unsubs.push(on("measure", setMeasurements));
    unsubs.push(on("preset_list", (m) => setPresets(m.presets)));
    unsubs.push(on("error", (m) => { /* 错误静默记录在底部栏 */ }));
    return () => unsubs.forEach(fn => fn());
  }, [on]);

  // HTML 渲染（后续任务逐步完善）
  return h("div", null,
    h(TopBar, { wsConnected, scopeConnected, scopeInfo, scanning, showScan, setShowScan, devices, send, presets, showPresetSave, setShowPresetSave, showPresetLoad, setShowPresetLoad }),
    h("div", { className: "main" },
      h(Sidebar, { scopeConnected, channels, setChannels, timebase, setTimebase, trigger, setTrigger, measurements, presets, send, showPresetSave, setShowPresetSave, showPresetLoad, setShowPresetLoad }),
      h(WaveformArea, { scopeConnected, send, on })
    ),
    h(BottomBar, { wsConnected, scopeConnected, fps })
  );
}

ReactDOM.render(h(App), document.getElementById("root"));
</script>
</body>
</html>
